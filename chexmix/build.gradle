// chexmix/build.gradle
plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow'
}
group = 'org.egc'
version = '1.0-SNAPSHOT'
dependencies {
    implementation project(':core')
    implementation fileTree(dir: 'libs', include: ['**/*.jar'])
}

shadowJar {
    archiveClassifier = ''
    manifest {
        attributes 'Main-Class': 'org.egc.chexmix.ChExMix'
    }
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
    mergeServiceFiles()
}
